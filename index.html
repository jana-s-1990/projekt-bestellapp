<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>

    <link rel="icon" href="assets/img/favicon/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="assets/img/favicon/favicon.png" sizes="32x32" />
    <link rel="icon" href="assets/img/favicon/favicon.ico" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/standard.css">
    <link rel="stylesheet" href="styles/flex.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/basket.css">
    <link rel="stylesheet" href="styles/categories.css">
    <link rel="stylesheet" href="styles/dish.css">

    <script src="scripts/db.js"></script>
    <script src="scripts/localStorage.js"></script>
    <script src="scripts/template.js"></script>
    <script src="script.js"></script>
</head>
<body onload="init()">
    <header class="main-header">
        <div class="content">
            <figure class="header-logo">
                <img src="assets/img/logo/logo-bestellapp.png" alt="Bestell App Logo">
            </figure>
        </div>
    </header>
    <main class="main-layout">
        <div class="main-content">
            <section id="content-header"></section>
            <section id="categorie-dishes"></section>
        </div>
        <aside class="basket-container">
            <div class="basket">
                <h2>Your Basket</h2>
                <div id="basket-items"></div>
                <div id="total-amount" class="cart-item-wrapper-delivery"></div>
            </div>
        </aside>
    </main>    
</body>
</html>
