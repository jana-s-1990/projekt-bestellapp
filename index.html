<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/standard.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/categories.css">

    <script src="scripts/db.js"></script>
    <script src="scripts/template.js"></script>
    <script src="script.js"></script>
</head>
<body onload="init()">
    <header class="main-header">
        <div class="content">
            <figure class="header-logo">
                <img src="https://placehold.co/200x50" alt="Bestell App Logo">
            </figure>
        </div>
    </header>
    <main>
        <section id="content-header"></section>
        <section>
            <div class="categorie-list">
                <div id="content-categories" class="content"></div>
            </div>
        </section>
        <section class="content">
            <header id="categorie-dishes-header"></header>
            <div id="categorie-dishes"></div>
        </section>
    </main>
    
</body>
</html>
