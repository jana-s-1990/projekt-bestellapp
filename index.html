<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestell App</title>

    <link
      rel="icon"
      href="assets/img/favicon/favicon.svg"
      type="image/svg+xml"
    />
    <link rel="icon" href="assets/img/favicon/favicon.png" sizes="32x32" />
    <link rel="icon" href="assets/img/favicon/favicon.ico" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="styles/standard.css" />
    <link rel="stylesheet" href="styles/flex.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <link rel="stylesheet" href="styles/footer.css" />
    <link rel="stylesheet" href="styles/basket.css" />
    <link rel="stylesheet" href="styles/categories.css" />
    <link rel="stylesheet" href="styles/dish.css" />
    <link rel="stylesheet" href="styles/order-overlay.css">

    <script src="scripts/db.js"></script>
    <script src="scripts/localStorage.js"></script>
    <script src="scripts/template.js"></script>
    <script src="script.js"></script>
  </head>
  <body onload="init()">
    <header class="main-header">
      <div>
        <figure class="header-logo">
          <img
            src="assets/img/logo/logo-bestellapp.png"
            alt="Bestell App Logo"
          />
        </figure>
        <div class="burger-btn">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </header>
    <main class="main-layout">
      <div class="main-content">
        <section id="content-header"></section>
        <section id="categorie-dishes"></section>
      </div>
      <div class="display-mobile mobile-basket">
        <button class="mobile-basket-btn" onclick="openMobileBasket()">
          <span class="left">
            <i class="fa-solid fa-basket-shopping"></i> Warenkorb
          </span>
          <span id="mobile-basket-total">0,00 €</span>
        </button>
      </div>
      <aside class="display-desktop basket-container">
        <div class="basket">
          <h2>Your Basket</h2>
          <div id="basket-items"></div>
          <div id="total-amount" class="cart-item-wrapper-delivery"></div>
        </div>
      </aside>
    </main>
    <dialog
      id="mobile-basket-container"
      class="display-mobile mobile-basket-dialog"
      onclick="closeMobileBasket()"
    >
      <div class="basket mobile-basket-wrapper" onclick="event.stopPropagation()">
        <div class="display-flex button-wrapper">
          <button class="close-btn-dialog" onclick="closeMobileBasket()" aira-label="Schließen"><i class="fa-solid fa-x"></i></button>
        </div>
        <h2>Your Basket</h2>
        <div id="mobile-basket-items"></div>
        <div id="mobile-total-amount" class="cart-item-wrapper-delivery"></div>
      </div>
    </dialog>

    <dialog id="order-feedback" class="order-feedback-container">
      <button class="order-feedback-close" onclick="closeOrderFeedback()">
        <i class="fa-solid fa-xmark"></i>
      </button>

      <div class="order-feedback-content">
        <div class="order-feedback-icon"><img src="assets/img/icons/ico-orderd.png" alt=""></div>
        <h2>Order confirmed!</h2>
        <p>Your food is on the way!</p>
      </div>
    </dialog>

    <footer class="display-flex main-footer">
      <p><i class="fa-regular fa-copyright"></i> 2025 BurgerHouse</p>
      <p>Imprint</p>
      <p>Cookie Preferences</p>
    </footer>
  </body>
</html>
